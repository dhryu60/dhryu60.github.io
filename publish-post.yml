name: Publish Post from Issue

on:
  issues:
    types: [opened, edited]

jobs:
  publish:
    if: contains(github.event.issue.labels.*.name, 'publish')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Post File
        run: |
          TITLE="${{ github.event.issue.title }}"
          # 파일명에 사용할 날짜 및 제목 정제
          DATE=$(date +'%Y-%m-%d')
          FILE_NAME_TITLE=$(echo "$TITLE" | sed 's/[^a-zA-Z0-9가-힣]/-/g' | tr '[:upper:]' '[:lower:]')
          FILE_NAME="_posts/${DATE}-${FILE_NAME_TITLE}.md"
          
          mkdir -p _posts
          
          # Issue 본문 내용을 파일로 저장
          echo "${{ github.event.issue.body }}" > $FILE_NAME

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/
          git commit -m "Create post from issue #${{ github.event.issue.number }}"
          git push
