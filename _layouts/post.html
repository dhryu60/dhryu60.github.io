---
layout: default
---

<article class="article">
  <header class="article-header">
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y. %m. %d." }}</time>
      {% if page.author %}
        <span>{{ page.author }}</span>
      {% endif %}
    </div>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p>{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="article-body">
    {{ content }}
  </div>
</article>
