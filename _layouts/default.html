<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'ko' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']],
          processEscapes: true
        },
        options: {
          skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
        },
        startup: {
          typeset: false,
          pageReady: function () {
            return MathJax.startup.defaultPageReady().then(function () {
              return MathJax.typesetPromise([document.querySelector('.article-body') || document.body]);
            });
          }
        }
      };

      window.loadMathJaxFallback = function () {
        if (window.MathJax && window.MathJax.startup && window.MathJax.startup.document) {
          return;
        }
        var fallback = document.createElement('script');
        fallback.src = 'https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-chtml.min.js';
        fallback.defer = true;
        document.head.appendChild(fallback);
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" onerror="loadMathJaxFallback()"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} 홈">
        <span class="brand-mark">기술<br>블로그</span>
        <span class="brand-name">{{ site.title }}</span>
      </a>
      <nav class="site-nav" aria-label="주요 메뉴">
        <a href="https://github.com/dhryu60/dhryu60.github.io/issues/new">글쓰기</a>
        <a href="https://github.com/dhryu60/dhryu60.github.io/wiki">Wiki</a>
        <a class="icon-link" href="https://github.com/dhryu60/dhryu60.github.io" aria-label="GitHub 저장소">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .5a12 12 0 0 0-3.8 23.4c.6.1.8-.3.8-.6v-2.1c-3.3.7-4-1.4-4-1.4-.5-1.3-1.2-1.6-1.2-1.6-1-.7.1-.7.1-.7 1.1.1 1.7 1.1 1.7 1.1 1 .1.8 2.1 3.4 1.5.1-.7.4-1.2.7-1.5-2.6-.3-5.4-1.3-5.4-5.9 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.6 1.7.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.4 5.9.4.4.8 1 .8 2.1v3.1c0 .3.2.7.8.6A12 12 0 0 0 12 .5Z"/></svg>
        </a>
      </nav>
    </header>

    <div class="page-shell">
      {{ content }}
    </div>
  </body>
</html>
